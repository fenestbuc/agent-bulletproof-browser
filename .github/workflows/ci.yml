name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install shellcheck and shfmt
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          curl -sSL https://github.com/mvdan/sh/releases/download/v3.11.0/shfmt_v3.11.0_linux_amd64 -o /tmp/shfmt
          chmod +x /tmp/shfmt
          sudo mv /tmp/shfmt /usr/local/bin/

      - name: Run shellcheck
        run: |
          shellcheck scripts/*.sh install.sh tests/run-tests.sh lib/*.sh

      - name: Run shfmt
        run: |
          shfmt -d -i 4 -ci scripts/*.sh install.sh tests/run-tests.sh lib/*.sh

  test:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local

      - name: Syntax check all shell scripts
        run: |
          bash -n scripts/run-agent-headless.sh
          bash -n scripts/start-agent-browser.sh
          bash -n scripts/agent-cookie-sync.sh
          bash -n install.sh
          bash -n tests/run-tests.sh
          bash -n lib/*.sh

      - name: Run manual test suite
        run: bash tests/run-tests.sh

      - name: Run bats test suite (legacy)
        run: bats tests/test-core.bats

      - name: Run lib unit tests
        run: bats tests/lib/

      - name: Verify JSON check output is valid ND-JSON
        run: |
          AGENT_JSON_LOG=1 bash scripts/run-agent-headless.sh --check | while read -r line; do
            echo "$line" | python3 -m json.tool >/dev/null 2>&1 || { echo "Invalid JSON: $line"; exit 1; }
          done
          echo "All JSON lines validated."
